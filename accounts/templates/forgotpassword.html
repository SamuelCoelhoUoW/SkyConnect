{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{% static 'css/forgotpassword.css' %}">
</head>
<body>
    <div class="auth-card">
        <div class="logo-container">
            <div class="logo-icon-wrapper">
                <i class="bi bi-cloud-fill logo-icon"></i>
            </div>
            <span class="logo-text">Sky Connect</span>  
        </div>

        <form method="POST">
            {% csrf_token %}
            <div class="mb-4">
                <label class="form-label">Email address</label>
                <input type="email" name="email" class="form-control" required>
            </div>

            <button type="submit" class="btn btn-primary w-100 mb-4">Reset password</button>
        </form>

        <div class="steps-list">
            <p class="mb-2 d-flex align-items-center gap-2">
                <i class="bi bi-list-check text-primary"></i>
                <span>Next steps...</span>
            </p>

            <p class="d-flex align-items-center">
                <i class="bi bi-envelope-check text-success ms-3"></i>
                <span class="ms-3">We will send a secure reset password link to your inbox</span>
            </p>

            <p class="d-flex align-items-center">
                <i class="bi bi-pencil-square text-warning ms-3"></i>
                <span class="ms-3">Create a new password</span>
            </p>

            <p class="d-flex align-items-center">
                <i class="bi bi-check-circle-fill text-primary ms-3"></i>
                <span class="ms-3">Finally sign in with your new password</span>
            </p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
