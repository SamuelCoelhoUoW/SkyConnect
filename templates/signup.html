{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Sky Connect</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <div style="max-width: 400px; margin: 4rem auto; padding: 2rem; background: white; border-radius: 8px;">
        <h2>Sign Up</h2>
        <form method="POST">
            {% csrf_token %}
            <label>Email address</label>
            <input type="email" name="email" required style="width:100%; padding:8px; margin: 4px 0 12px;">
            <label>Username</label>
            <input type="text" name="username" required style="width:100%; padding:8px; margin: 4px 0 12px;">
            <label>Password</label>
            <input type="password" name="password" required style="width:100%; padding:8px; margin: 4px 0 12px;">
            <label>Confirm password</label>
            <input type="password" name="confirm_password" required style="width:100%; padding:8px; margin: 4px 0 12px;">
            <button type="submit" style="width:100%; padding:10px; background:#0072ce; color:white; border:none; border-radius:4px; cursor:pointer;">Sign up</button>
        </form>
        <p style="margin-top:1rem; text-align:center;"><a href="/login/">Back to sign in</a></p>
    </div>
</body>
</html>
